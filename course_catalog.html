<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>All Courses Catalog</title>
</head>
<body class="bg-light">
    <div class="container py-5 text-center">
        <h1 class="fw-bold mb-2">SkillTrend Course Catalog</h1>
        <p class="text-muted mb-5">Explore all 50+ specialized career paths</p>
        <div class="row g-4">
            {% for course in courses %}
            <div class="col-md-3">
                <div class="card h-100 border-0 shadow-sm p-3">
                    <h6 class="fw-bold">{{ course.title }}</h6>
                    <small class="text-primary">{{ course.platform }}</small>
                    <a href="/course/{{ course.id }}" class="btn btn-sm btn-dark mt-3">Learn More</a>
                </div>
            </div>
            {% endfor %}
        </div>
        <div class="mt-5"><a href="/" class="btn btn-outline-primary">Return to Dashboard</a></div>
    </div>
</body>
</html>
