<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Job Explorer | SkillTrend</title>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-lg p-5 border-0 rounded-4">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div><h1 class="fw-bold mb-0">Global Opportunities</h1><p class="text-muted">Tracking {{ jobs|length }} live positions across 5 sectors</p></div>
            <a href="/" class="btn btn-outline-secondary rounded-pill px-4">← Dashboard</a>
        </div>

        <input type="text" id="jobSearch" class="form-control form-control-lg mb-4 shadow-sm" placeholder="Filter by Role, Company, or Location (e.g. London)...">

        <table class="table table-hover align-middle" id="jobTable">
            <thead class="table-dark"><tr><th>Position</th><th>Organization</th><th>Hub</th><th>Industry</th><th>Status</th></tr></thead>
            <tbody>
                {% for job in jobs %}
                <tr>
                    <td><strong class="text-primary">{{ job.role }}</strong></td>
                    <td>{{ job.company }}</td>
                    <td><i class="fas fa-map-marker-alt text-muted small"></i> {{ job.location }}</td>
                    <td><span class="badge bg-info text-dark">{{ job.industry }}</span></td>
                    <td><button class="btn btn-sm btn-success px-3 rounded-pill">View</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('jobSearch').addEventListener('keyup', function() {
        let value = this.value.toLowerCase();
        let rows = document.querySelectorAll('#jobTable tbody tr');
        rows.forEach(row => { row.style.display = row.innerText.toLowerCase().includes(value) ? '' : 'none'; });
    });
</script>
</body>
</html>
